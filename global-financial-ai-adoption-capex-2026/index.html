<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="欧美顶级金融机构AI应用、数据库改造、Token调用与资本支出专题研究。">
<title>欧美顶级金融机构 AI 应用与资本支出深度报告</title>
<style>
html,body{margin:0;min-height:100%;background:#f3f6fa;font-family:Inter,system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
#loading{min-height:100vh;display:grid;place-items:center;color:#475569;font-size:14px;text-align:center;padding:24px}
#loading strong{display:block;color:#071a30;font-size:20px;margin-bottom:8px}
#error{display:none;max-width:680px;margin:80px auto;padding:24px;background:#fff;border:1px solid #d9e2ec;border-radius:16px;color:#475569;line-height:1.7}
</style>
</head>
<body>
<div id="loading"><div><strong>正在载入深度报告</strong>恢复上一版视觉，并移除第7部分信息源。</div></div>
<div id="error">报告载入失败，请刷新页面重试。</div>
<script>
(function(){
  var historical='https://raw.githubusercontent.com/Kerwin7081/Kerwin7081.github.io/e0b3477b186ba978e6b6a593a7f209481d054b03/global-financial-ai-adoption-capex-2026.html';
  fetch(historical,{cache:'force-cache'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(html){
      var parsed=new DOMParser().parseFromString(html,'text/html');
      var sourceSection=parsed.querySelector('#sources');
      if(sourceSection)sourceSection.remove();
      parsed.querySelectorAll('a[href="#sources"]').forEach(function(a){a.remove();});
      parsed.querySelectorAll('.source-ref').forEach(function(el){el.remove();});
      parsed.title='欧美顶级金融机构 AI 应用与资本支出深度报告';
      document.open();
      document.write('<!DOCTYPE html>'+parsed.documentElement.outerHTML);
      document.close();
    })
    .catch(function(){
      var loading=document.getElementById('loading');
      var error=document.getElementById('error');
      if(loading)loading.style.display='none';
      if(error)error.style.display='block';
    });
})();
</script>
</body>
</html>
