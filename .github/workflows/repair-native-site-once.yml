name: One-time native EnyaClawd repair

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/repair-native-site-once.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  repair-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out current main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Repair native article source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          article = Path('ineffable-superlearner-rubin-a5x-20260723/index.html')
          text = article.read_text(encoding='utf-8')
          target = '<link rel="stylesheet" href="/assets/kerwin-system-v2.css?v=20260718sitewide1">\n'
          if target not in text:
              raise SystemExit('Expected conflicting stylesheet link was not found; refusing broad mutation.')
          article.write_text(text.replace(target, '', 1), encoding='utf-8')

          for fallback in [Path('404.html'), Path('ineffable-superlearner-rubin-a5x-20260723.html')]:
              if fallback.exists():
                  fallback.unlink()
          PY

      - name: Commit repaired native source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair Ineffable native page and remove temporary fallbacks"
          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload repaired static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy repaired static site
        id: deployment
        uses: actions/deploy-pages@v4
