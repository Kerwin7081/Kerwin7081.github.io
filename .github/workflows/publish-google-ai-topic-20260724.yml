name: Publish Google AI Topic

on:
  push:
    paths:
      - '.github/workflows/publish-google-ai-topic-20260724.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update page, metadata and homepage registry
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          slug = "google-ai-hypercomputer-tpu-virgo-optics-20260723"
          page_path = Path(slug) / "index.html"
          meta_path = Path(slug) / "meta.json"
          registry_path = Path("registry.json")

          page = page_path.read_text(encoding="utf-8")
          replacements = {
              "报告发布日期：2026年7月23日": "报告发布日期：2026年7月24日",
              "2026年7月23日 · AI 基础设施专题研究": "2026年7月24日 · AI 基础设施专题研究",
              "数据截至2026年7月23日": "数据截至2026年7月24日",
              "截至 2026 年 7 月 23 日": "截至 2026 年 7 月 24 日",
          }
          for old, new in replacements.items():
              page = page.replace(old, new)
          if "报告发布日期：2026年7月24日" not in page:
              raise SystemExit("visible publication date was not updated")
          page_path.write_text(page, encoding="utf-8")

          meta = json.loads(meta_path.read_text(encoding="utf-8"))
          meta.update({
              "date": "2026-07-24",
              "published": True,
              "homepage_approved": True,
              "published_at": "2026-07-24T23:50:00+08:00",
              "updated_at": "2026-07-24T23:50:00+08:00",
          })
          meta_path.write_text(json.dumps(meta, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          registry = [item for item in registry if item.get("slug") != slug]
          registry.append({
              "slug": slug,
              "title": "两套AI工厂的正面交锋\nGoogle Axion、TPU、Virgo vs NVIDIA Vera、Rubin与NVLink",
              "date": "2026年7月24日",
              "deck": "从Alphabet电话会中的Kakao TPU案例和Virgo网络出发，准确对照Google Axion、TPU、ICI/Virgo与NVIDIA Vera、Rubin、NVLink/Spectrum-X，并延伸到1.6T、CPO和中际旭创的产业链投资映射。",
              "tag": "AI Infrastructure & Optical Interconnect",
              "category": "AI Infrastructure & Optical Interconnect",
              "source": "enya",
              "homepage_approved": True,
              "published_at": "2026-07-24T23:50:00+08:00"
          })
          registry.sort(key=lambda item: item.get("published_at", ""), reverse=True)
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, separators=(",", ":")) + "\n", encoding="utf-8")

          assert meta["homepage_approved"] is True
          assert any(item.get("slug") == slug and item.get("homepage_approved") is True for item in registry)
          print("Updated", page_path, meta_path, registry_path)
          PY

      - name: Commit publication changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add google-ai-hypercomputer-tpu-virgo-optics-20260723/index.html \
                  google-ai-hypercomputer-tpu-virgo-optics-20260723/meta.json \
                  registry.json
          git commit -m "publish Google AI Hypercomputer专题 to homepage"
          git push origin HEAD:main
