name: Sync native longform pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout root site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout source pages
        uses: actions/checkout@v4
        with:
          repository: Kerwin7081/future-phone-agent-html
          ref: main
          path: source

      - name: Copy native HTML pages
        run: |
          cp source/agent-payment-standards-longform.html site/agent-payment-standards-longform.html
          cp source/circle-cpn-managed-payments-longform.html site/circle-cpn-managed-payments-longform.html
          printf 'enyaclawd.com\n' > site/CNAME

      - name: Commit synced pages
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-payment-standards-longform.html circle-cpn-managed-payments-longform.html CNAME
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync native longform pages from source repo"
            git push
          fi
