name: One-time Nokia Q2 editorial revision

on:
  push:
    branches:
      - revise/nokia-q2-2026-quality-20260724
    paths:
      - ".github/workflows/revise-nokia-q2-once.yml"

permissions:
  contents: write

jobs:
  revise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out isolated revision branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply exact article and metadata revisions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          article = Path('nokia-q2-2026-earnings-call-20260724/index.html')
          text = article.read_text(encoding='utf-8')

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              '<nav class="nav" aria-label="页面导航"><a href="#verdicts">结论</a><a href="#method">研究起点</a><a href="#results">财务质量</a><a href="#orders">订单质量</a><a href="#optical">光网络</a><a href="#ip">IP交换</a><a href="#airan">AI-RAN</a><a href="#cash">现金流</a><a href="#market">市场反应</a><a href="#mapping">产业映射</a><a href="#signals">信号灯</a><a href="#monitor">监测</a><a href="#sources">来源</a></nav>',
              '<nav class="nav" aria-label="页面导航"><a href="#verdicts">核心结论</a><a href="#results">财务与订单</a><a href="#optical">Optical / IP</a><a href="#airan">AI-RAN</a><a href="#cash">现金流与市场</a><a href="#mapping">产业映射</a><a href="#monitor">监测与来源</a></nav>',
              'navigation compression'
          )

          replace_once(
              '.market-strip{display:grid;grid-template-columns:1fr 1fr;background:#251f1b;color:#f7eee7;margin:18px 0}.market-cell{padding:19px;border-right:1px solid rgba(255,255,255,.22)}.market-cell:last-child{border-right:0}.market-cell strong{display:block;font-family:Georgia,serif;font-size:29px;color:#fff}.market-cell span{font-size:11px;color:#d9cbc0}.source-list{border-top:1px solid var(--rule)}.source{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--rule)}.source-num{display:grid;place-items:center;width:28px;height:28px;border:1px solid var(--green);color:var(--green);font-size:10px;font-weight:900}.source a{font-weight:800;font-size:13px;word-break:break-word}.source small{display:block;font-size:11px;color:var(--muted);line-height:1.55;margin-top:3px}.related{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--rule);border-left:1px solid var(--rule);margin-top:16px}.related a{padding:15px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);text-decoration:none;font-family:Georgia,"Songti SC",serif;font-weight:700;line-height:1.45;background:#fff}',
              '.market-strip{display:grid;grid-template-columns:1fr 1fr;background:#251f1b;color:#f7eee7;margin:18px 0}.market-cell{padding:19px;border-right:1px solid rgba(255,255,255,.22)}.market-cell:last-child{border-right:0}.market-cell strong{display:block;font-family:Georgia,serif;font-size:29px;color:#fff}.market-cell span{font-size:11px;color:#d9cbc0}.funnel{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--rule);border-left:1px solid var(--rule);margin-top:18px;background:#fff}.funnel-step{position:relative;min-height:132px;padding:16px 14px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)}.funnel-step b{display:block;font-family:Georgia,"Songti SC",serif;font-size:16px;color:var(--green)}.funnel-step strong{display:block;margin-top:7px;font-family:Georgia,serif;font-size:24px;color:var(--ink)}.funnel-step span{display:block;margin-top:7px;font-size:10px;line-height:1.55;color:var(--muted)}.funnel-step:not(:last-child):after{content:"→";position:absolute;right:-9px;top:48px;z-index:2;width:18px;height:18px;display:grid;place-items:center;color:var(--copper);background:var(--ivory);font-weight:900}.valuation-note{margin-top:12px;font-size:12px;color:var(--muted)}.source-list{border-top:1px solid var(--rule)}.source{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--rule)}.source-num{display:grid;place-items:center;width:28px;height:28px;border:1px solid var(--green);color:var(--green);font-size:10px;font-weight:900}.source a{font-weight:800;font-size:13px;word-break:break-word}.source small{display:block;font-size:11px;color:var(--muted);line-height:1.55;margin-top:3px}.related{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--rule);border-left:1px solid var(--rule);margin-top:16px}.related a{padding:16px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);text-decoration:none;background:#fff}.related-kicker{display:block;font-size:9px;letter-spacing:.12em;font-weight:900;color:var(--copper);text-transform:uppercase}.related-title{display:block;margin-top:7px;font-family:Georgia,"Songti SC",serif;font-size:16px;font-weight:700;line-height:1.4;color:var(--green)}.related-desc{display:block;margin-top:7px;font-size:11px;line-height:1.6;color:var(--muted)}',
              'new visual components'
          )

          replace_once(
              '@media(max-width:700px){.page{padding:0 4px;margin-top:7px}.site-route{padding-left:10px}.masthead,.hero,.section,.enya,.disclaimer,.footer{padding-left:18px;padding-right:18px}.mast-grid{grid-template-columns:1fr}.issue{text-align:left}.masthead h1{font-size:30px}.hero h2{font-size:29px}.hero .lead{font-size:15px}.key-stats{grid-template-columns:1fr 1fr}.verdict-grid,.split,.scenarios,.related{grid-template-columns:1fr}.verdict-item.wide{grid-column:auto}.method-chain{grid-template-columns:1fr}.method-node{min-height:auto;border-right:0;border-bottom:1px solid var(--green)}.method-node:last-child{border-bottom:0}.flow-node{grid-template-columns:1fr;gap:4px}.signal-board{grid-template-columns:1fr}.signal-col{border-right:0;border-bottom:1px solid var(--rule)}.signal-col:last-child{border-bottom:0}.market-strip{grid-template-columns:1fr}.market-cell{border-right:0;border-bottom:1px solid rgba(255,255,255,.22)}.market-cell:last-child{border-bottom:0}.related a{border-right:1px solid var(--rule)}}',
              '@media(max-width:700px){.page{padding:0 4px;margin-top:7px}.site-route{padding-left:10px}.masthead,.hero,.section,.enya,.disclaimer,.footer{padding-left:18px;padding-right:18px}.mast-grid{grid-template-columns:1fr}.issue{text-align:left}.masthead h1{font-size:30px}.hero h2{font-size:29px}.hero .lead{font-size:15px}.key-stats{grid-template-columns:1fr 1fr}.verdict-grid,.split,.scenarios,.related,.funnel{grid-template-columns:1fr}.verdict-item.wide{grid-column:auto}.method-chain{grid-template-columns:1fr}.method-node{min-height:auto;border-right:0;border-bottom:1px solid var(--green)}.method-node:last-child{border-bottom:0}.flow-node{grid-template-columns:1fr;gap:4px}.signal-board{grid-template-columns:1fr}.signal-col{border-right:0;border-bottom:1px solid var(--rule)}.signal-col:last-child{border-bottom:0}.market-strip{grid-template-columns:1fr}.market-cell{border-right:0;border-bottom:1px solid rgba(255,255,255,.22)}.market-cell:last-child{border-bottom:0}.funnel-step{min-height:auto}.funnel-step:not(:last-child):after{content:"↓";right:calc(50% - 9px);top:auto;bottom:-10px}.related a{border-right:1px solid var(--rule)}}',
