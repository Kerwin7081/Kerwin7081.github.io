      - name: Commit revised article only
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refine Nokia Q2 research content and presentation"
          git push origin HEAD:revise/nokia-q2-2026-quality-20260724
