              '<div class="key-stat"><strong>−€732M</strong><span>Q2自由现金流<br>增长尚未转为现金</span></div></div><div class="funnel" aria-label="订单到自由现金流传导"><div class="funnel-step"><b>订单确认</b><strong>€2.8B</strong><span>证明需求进入多年采购与产能锁定阶段。</span></div><div class="funnel-step"><b>未来12个月收入</b><strong>约€1.4B</strong><span>按管理层约50%的转化口径计算，并非全部立即确认。</span></div><div class="funnel-step"><b>经营利润</b><strong>取决于组合</strong><span>Optical规模效应、IP早期毛利率和交付效率共同决定。</span></div><div class="funnel-step"><b>自由现金流</b><strong>−€732M</strong><span>库存、应收、扩产及重组使订单尚未转化为股东现金。</span></div></div></section>',
              'order-to-cash funnel'
          )

          replace_once(
              '<h3>光网络负责规模，IP负责增量</h3>',
              '<h3>当前光网络贡献主要规模，IP交换贡献新增设计胜出</h3>',
              'verdict precision'
          )

          replace_once(
              '<div class="callout"><b>证据规则：</b>财报、官方演示材料和管理层电话会原话列为A级证据；公司披露的未来性能与时间表列为管理层自报；产业链与市场定价解释列为Kerwin推断；未得到公司确认的供应商关系不写成事实。</div><div class="flow">',
              '<div class="callout"><b>证据规则：</b>财报、官方演示材料和管理层电话会原话列为A级证据；公司披露的未来性能与时间表列为管理层自报；产业链与市场定价解释列为Kerwin推断；未得到公司确认的供应商关系不写成事实。</div><h3>Q1到Q2：投资问题已经变化</h3><div class="table-wrap"><table><thead><tr><th>指标</th><th>Q1 2026</th><th>Q2 2026</th><th>投资含义</th></tr></thead><tbody><tr><td>AI与云订单</td><td>€1.0B</td><td>€2.8B</td><td>需求明显加速，但大单具有季度波动性</td></tr><tr><td>AI与云销售增长</td><td>+49%</td><td>+105%</td><td>增长从验证阶段进入收入加速阶段</td></tr><tr><td>核心问题</td><td>客户是否采购</td><td>能否交付并转化现金</td><td>估值观察从需求验证转向供给、利润和FCF</td></tr></tbody></table></div><div class="flow">',
              'quarter acceleration comparison'
          )

          replace_once(
              '<h2>光网络是当前增长主引擎，InP产能决定上限</h2>',
              '<h2>光网络是当前增长主引擎，InP、存储器与测试封装共同决定交付上限</h2>',
              'optical constraint precision'
          )

          replace_once(
              'IP Networks销售额6.79亿欧元，恒定汇率增长16%。',
              'IP Networks销售额4.90亿欧元，恒定汇率增长16%。',
              'IP Networks revenue correction'
          )

          replace_once(
              '<section class="section" id="signals"><div class="section-label">11 · SIGNAL LIGHTS & FALSIFICATION</div>',
              '<section class="section" id="valuation"><div class="section-label">11 · VALUATION FRAMEWORK</div><h2>不急于给单一目标价，先判断再评级需要什么</h2><div class="table-wrap"><table><thead><tr><th>估值维度</th><th>当前观察口径</th><th>再评级条件</th><th>去评级条件</th></tr></thead><tbody><tr><td>经营利润</td><td>2026年可比经营利润€2.1B至€2.6B，管理层定位略高于中点</td><td>Network Infrastructure利润率持续提升</td><td>产品组合或成本压力使利润率回落</td></tr><tr><td>现金流</td><td>FCF转化率指引55%至75%，当前倾向低端</td><td>库存与应收释放，Q4现金流明显修复</td><td>持续靠近或跌破55%下限</td></tr><tr><td>业务质量</td><td>AI与云订单和销售高速增长，但客户较集中</td><td>客户扩展、订单取消率低、收入转化稳定</td><td>大单延期、客户削减资本开支或集中度恶化</td></tr><tr><td>战略选择权</td><td>AI-RAN仍处试点与路线图阶段</td><td>试点转商用并披露TCO、功耗和收入证据</td><td>验证节点推迟或研发回报不足</td></tr></tbody></table></div><p class="valuation-note">估值结论必须与兑现路径绑定：技术受益、订单受益、收入受益、利润受益和估值受益不能合并为同一个判断。</p></section><section class="section" id="signals"><div class="section-label">12 · SIGNAL LIGHTS & FALSIFICATION</div>',
              'valuation framework'
          )

          replace_once(
              'Network Infrastructure毛利率提高240个基点。',
              'Network Infrastructure毛利率提高170个基点，经营利润率提高240个基点。',
              'NI margin basis-point correction'
          )

          replace_once('<div class="section-label">12 · 12–18 MONTH SCENARIOS</div>', '<div class="section-label">13 · 12–18 MONTH SCENARIOS</div>', 'scenario renumbering')
          replace_once('<div class="section-label">13 · MONITORING DASHBOARD</div>', '<div class="section-label">14 · MONITORING DASHBOARD</div>', 'monitor renumbering')
          replace_once('<div class="section-label">14 · PRIMARY SOURCES</div>', '<div class="section-label">15 · PRIMARY SOURCES</div>', 'source renumbering')

          replace_once(
              '电话会转录属于辅助来源，出现冲突时以官方财报和演示材料为准。PDF页面截图工具在本次研究中出现技术错误，因此图表数据采用官方PDF解析文本交叉核对。',
              '电话会转录属于辅助来源，出现冲突时以官方财报和演示材料为准。图表及数据依据诺基亚官方财报、演示材料和电话会内容交叉核对。',
              'remove internal tooling note'
          )

          replace_once(
              '<h3>相关研究</h3><div class="related"><a href="/ai-optical-interconnect-industry-chain-20260627/">AI光互联产业链全景</a><a href="/nvidia-edge-ai-ran-6g/">AI-RAN与6G边缘网络</a><a href="/ineffable-superlearner-rubin-a5x-20260723/">Rubin A5X与下一代AI基础设施</a></div>',
              '<h3>下一条研究路径</h3><div class="related"><a href="/ineffable-superlearner-rubin-a5x-20260723/"><span class="related-kicker">需求源头</span><span class="related-title">Rubin A5X与下一代AI基础设施</span><span class="related-desc">理解AI Factory为何需要更多跨机架、跨园区和跨数据中心网络。</span></a><a href="/ai-optical-interconnect-industry-chain-20260627/"><span class="related-kicker">近端产业链</span><span class="related-title">AI光互联产业链全景</span><span class="related-desc">沿Optical、DSP、InP、光模块和CPO继续追踪价值传导。</span></a><a href="/nvidia-edge-ai-ran-6g/"><span class="related-kicker">长期选择权</span><span class="related-title">AI-RAN与6G边缘网络</span><span class="related-desc">理解诺基亚与NVIDIA合作如何改变RAN的软件与硅片经济学。</span></a></div>',
              'related research path'
          )

          article.write_text(text, encoding='utf-8')

          meta_path = Path('nokia-q2-2026-earnings-call-20260724/meta.json')
          meta = json.loads(meta_path.read_text(encoding='utf-8'))
