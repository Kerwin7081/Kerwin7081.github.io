# Retrigger after the workflow became resident on main.
name: Trigger offshore trust VIE update

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trigger-offshore-trust-vie-update.yml"

permissions:
  contents: write

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out public website
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute the audited one-time content patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import sys
          import textwrap

          source = Path('.github/workflows/apply-offshore-trust-vie-update-once.yml')
          text = source.read_text(encoding='utf-8')
          match = re.search(r"python3 - <<'PY'\n(.*?)\n\s{10}PY\n", text, re.S)
          if not match:
              raise SystemExit('unable to locate one-time Python patch')
          script = textwrap.dedent(match.group(1))
          temp = Path('/tmp/apply_offshore_trust_update.py')
          temp.write_text(script, encoding='utf-8')
          subprocess.run([sys.executable, str(temp)], check=True)
          Path('.github/workflows/trigger-offshore-trust-vie-update.yml').unlink()
          PY

      - name: Commit audited page update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add offshore-trust-tax-china-ipo-20260724/index.html offshore-trust-tax-china-ipo-20260724/meta.json registry.json .github/workflows/apply-offshore-trust-vie-update-once.yml .github/workflows/trigger-offshore-trust-vie-update.yml
          git commit -m "expand offshore trust report with Hong Kong red-chip and VIE exposure"
          git push origin HEAD:main
