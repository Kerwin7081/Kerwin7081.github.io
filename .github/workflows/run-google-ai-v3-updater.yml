name: Run Google AI v3 Updater

on:
  push:
    paths:
      - '.github/workflows/run-google-ai-v3-updater.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract and apply audited page payload
        shell: bash
        run: |
          python3 - <<'PY'
          import base64, gzip, json, re
          from pathlib import Path

          source = Path('.github/workflows/apply-google-ai-v3-page.yml').read_text(encoding='utf-8')
          match = re.search(r"data = '''(.*?)'''", source, re.S)
          if not match:
              raise SystemExit('embedded audited page payload not found')
          html = gzip.decompress(base64.b64decode(''.join(match.group(1).split()))).decode('utf-8')

          slug = 'google-ai-hypercomputer-tpu-virgo-optics-20260723'
          page_path = Path(slug) / 'index.html'
          meta_path = Path(slug) / 'meta.json'
          registry_path = Path('registry.json')
          page_path.write_text(html, encoding='utf-8')

          meta = json.loads(meta_path.read_text(encoding='utf-8'))
          meta.update({
              'date': '2026-07-24',
              'published': True,
              'homepage_approved': True,
              'summary': '以Kakao采用Google TPU与Virgo网络为证据，比较Google Axion、TPU、ICI、Virgo与NVIDIA Vera、Rubin、NVLink、Spectrum-X，并追踪1.6T、CPO及中际旭创的产业链投资意义；页面采用Kerwin Web v3.3.0 FT暖纸与森林绿编辑系统。',
              'updated_at': '2026-07-24T23:58:00+08:00'
          })
          meta_path.write_text(json.dumps(meta, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          registry = json.loads(registry_path.read_text(encoding='utf-8'))
          item = next((x for x in registry if x.get('slug') == slug), None)
          if item is None:
              raise SystemExit('homepage registry entry not found')
          item.update({
              'date': '2026年7月24日',
              'homepage_approved': True,
              'deck': '以Kakao采用Google TPU与Virgo网络为证据，准确对照Google Axion、TPU、ICI/Virgo与NVIDIA Vera、Rubin、NVLink/Spectrum-X，并延伸到1.6T、CPO和中际旭创的产业链投资映射。'
          })
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, separators=(',', ':')) + '\n', encoding='utf-8')

          checks = [
              'class="kw-research kw-v3"',
              '输入 “k” 即可显示，不分大小写',
              'EXECUTIVE VERDICT',
              'Verified fact',
              'Kerwin inference',
              'Unresolved',
              'Enya：香港首个由 OpenClaw 打造的女性投顾 Agent',
              '底层模型：GPT 5.6 Sol 及 Claude Fable 付费版',
              '相关研究路径',
              'href="/"'
          ]
          missing = [token for token in checks if token not in html]
          if missing:
              raise SystemExit('missing required v3 tokens: ' + ', '.join(missing))
          if 'localStorage' in html or 'sessionStorage' in html:
              raise SystemExit('editorial access gate must not persist state')
          print('Audited v3 page payload applied')
          PY
      - name: Commit audited v3 page
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add google-ai-hypercomputer-tpu-virgo-optics-20260723/index.html \
                  google-ai-hypercomputer-tpu-virgo-optics-20260723/meta.json \
                  registry.json
          if git diff --cached --quiet; then
            echo 'No content changes required.'
            exit 0
          fi
          git commit -m 'rebuild Google AI factory topic with Kerwin Web v3.3.0'
          git push origin HEAD:main
