<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hyperliquid 第一课：传统金融人如何看懂链上交易所</title>
<meta name="description" content="从长鑫存储 CXMT 合约出发，用传统金融语言解释 Hyperliquid、永续合约、USDC、链上订单簿与清算，并梳理投资者可以如何观察、交易和控制风险。">
<style>
html,body{margin:0;min-height:100%;background:#fff1e5;color:#1f1a17;font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif}.loading{max-width:760px;margin:80px auto;padding:32px;text-align:center;background:#fffaf4;border:1px solid #dccdbf}.loading h1{font-family:Georgia,'Times New Roman',serif;font-size:28px}.loading p{color:#6f6258}
</style>
</head>
<body>
<div class="loading" id="loading"><h1>Hyperliquid 第一课</h1><p>研究页面加载中…</p></div>
<script>
(async function(){
  try{
    var files=[];
    for(var i=1;i<=8;i++)files.push('./core-tradfi-'+i+'.txt?v=20260719c');
    var responses=await Promise.all(files.map(function(url){return fetch(url,{cache:'no-store'});}));
    responses.forEach(function(r){if(!r.ok)throw new Error('HTTP '+r.status);});
    var parts=await Promise.all(responses.map(function(r){return r.text();}));
    var html=parts.join('');
    document.open();document.write(html);document.close();
  }catch(error){
    document.getElementById('loading').innerHTML='<h1>页面加载失败</h1><p>请刷新页面重试。</p>';
    console.error(error);
  }
})();
</script>
</body>
</html>
