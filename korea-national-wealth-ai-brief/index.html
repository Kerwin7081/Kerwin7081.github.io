<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0;url=/korea-national-wealth-ai-brief-tmp/">
<title>韩国国民财富提升 · 页面跳转</title>
<!-- pv-counter data-page-slug=korea-national-wealth-ai-brief -->
<style>
:root{--bg:#fff1e5;--paper:#fffaf4;--ink:#1f1a17;--muted:#6f6258;--line:#dccdbf;--gold:#8a5b2b}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.8}
.back{max-width:780px;margin:0 auto;padding:6px 10px 0}.back a{display:inline-block;font-size:12px;color:var(--gold);text-decoration:none;font-weight:700;padding:4px 10px;border:1px solid var(--line);border-radius:4px;background:var(--paper)}
.page{max-width:780px;margin:0 auto;padding:10px 10px 24px}.card{background:var(--paper);border:1px solid var(--line);padding:22px 18px;text-align:center}.counter-wrap{text-align:center;margin:18px 0 6px;font-size:11px;line-height:1.75;color:var(--muted)}
@media(max-width:640px){.page{padding:0 4px 20px}.card{padding:18px 14px}}
</style>
</head>
<body data-page-slug="korea-national-wealth-ai-brief">
<div class="back"><a href="/">← 返回首页</a></div>
<div class="page"><div class="card"><p>页面已移动，正在跳转；如果没有自动打开，请 <a href="/korea-national-wealth-ai-brief-tmp/">点击这里访问新页面</a>。</p></div></div>
<div class="counter-wrap">👀 页面浏览量：<span class="counter-num" id="counter-num">...</span></div>
<script>
(function(){
  var slug = document.querySelector('[data-page-slug]');
  var slugVal = (slug && slug.getAttribute('data-page-slug')) || 'home';
  var counterUrl = 'https://enyaclawd-counter.kerwin-finance.workers.dev?page=' + encodeURIComponent(slugVal);
  var el = document.getElementById('counter-num');
  fetch(counterUrl).then(function(r){return r.json()}).then(function(d){ if(el) el.textContent = d.count.toLocaleString(); }).catch(function(){ if(el) el.textContent = '-'; });
  fetch(counterUrl, {method:'POST'}).then(function(r){return r.json()}).then(function(d){ if(el) el.textContent = d.count.toLocaleString(); }).catch(function(){});
})();
</script>
</body>
</html>
